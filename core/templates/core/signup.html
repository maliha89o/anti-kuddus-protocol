<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Anti-Kuddus Protocol</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f1e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        h1 { color: #0d7377; margin-bottom: 24px; text-align: center; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #d8d0c0;
            border-radius: 8px;
            font-size: 15px;
        }
        button {
            width: 100%;
            background: #0d7377;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover { background: #0a5c60; }
        .message { background: #fde2e2; color: #a12222; padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .switch { text-align: center; margin-top: 16px; font-size: 14px; color: #666; }
        .switch a { color: #0d7377; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝 Sign Up</h1>
        {% if messages %}
            {% for message in messages %}<div class="message">{{ message }}</div>{% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <div class="switch">Already have an account? <a href="{% url 'login' %}">Login</a></div>
    </div>
</body>
</html>
