<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Kuddus Protocol</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0d7377, #14a3a8);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .hero {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        h1 {
            font-size: 42px;
            margin-bottom: 16px;
        }
        p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 32px;
        }
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .btn {
            padding: 14px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: white; color: #0d7377; }
        .btn-secondary { background: transparent; border: 2px solid white; color: white; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🛡️ Anti-Kuddus Protocol</h1>
        <p>Save Section B from Kodu Kuddus's tyranny — report anonymously, organize your class, and reclaim your rights.</p>
        <div class="btn-group">
            <a href="{% url 'login' %}" class="btn btn-primary">Login</a>
            <a href="{% url 'signup' %}" class="btn btn-secondary">Sign Up</a>
        </div>
    </div>
</body>
</html>
