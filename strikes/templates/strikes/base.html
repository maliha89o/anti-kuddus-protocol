{% load static %}
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anti-Kuddus Protocol{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f1e8;
            color: #1f3a3d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 480px;
            width: 100%;
        }
        h1 {
            color: #0d7377;
            margin-bottom: 20px;
            font-size: 24px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #d8d0c0;
            border-radius: 8px;
            font-size: 15px;
        }
        button {
            background: #0d7377;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: #0a5c60; }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .error { background: #fde2e2; color: #a12222; }
        .success { background: #dcf5e8; color: #17703c; }
        .progress-bar-outer {
            background: #eee;
            border-radius: 20px;
            overflow: hidden;
            height: 24px;
            margin: 16px 0;
        }
        .progress-bar-inner {
            background: linear-gradient(90deg, #0d7377, #14a3a8);
            height: 100%;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
